<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5"
    />
    <title>涩痞影像馆</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(circle at 20% 10%, #1a0a2e, #0a0418);
        min-height: 100vh;
        padding: 2rem 1.2rem 2.5rem;
        font-family:
          "Inter", system-ui, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        backdrop-filter: blur(2px);
      }

      .app-container {
        max-width: 1450px;
        width: 100%;
        background: rgba(20, 8, 40, 0.5);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-radius: 3.2rem;
        box-shadow:
          0 35px 70px -20px rgba(0, 0, 0, 0.8),
          inset 0 1px 2px rgba(255, 100, 200, 0.15);
        border: 1px solid rgba(180, 60, 120, 0.3);
        padding: 2rem 2rem 2.5rem;
        transition: all 0.3s ease;
        color: #f0d0e8;
      }

      .header {
        text-align: center;
        margin-bottom: 2.4rem;
        position: relative;
      }

      .header h1 {
        font-size: 2.8rem;
        font-weight: 800;
        background: linear-gradient(
          180deg,
          #ffb8d8 0%,
          #e8609a 50%,
          #c04070 100%
        );
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: 1px;
        text-shadow: 0 8px 18px rgba(200, 30, 100, 0.4);
        margin-bottom: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .header h1 .icon-left,
      .header h1 .icon-right {
        font-size: 2.4rem;
        filter: drop-shadow(0 4px 8px #ff4488);
      }

      /* 标题图标图片 */
      .title-icon-img {
        width: 48px;
        height: 48px;
        object-fit: contain;
        filter: drop-shadow(0 4px 10px rgba(255, 60, 130, 0.6));
        vertical-align: middle;
      }

      .header .subtitle {
        color: #ff9ec8;
        font-weight: 500;
        font-size: 1.05rem;
        background: rgba(40, 10, 30, 0.6);
        display: inline-block;
        padding: 0.45rem 2rem;
        border-radius: 40px;
        backdrop-filter: blur(5px);
        letter-spacing: 0.6px;
        margin-top: 0.3rem;
        border: 1px solid rgba(255, 100, 160, 0.5);
      }

      .header .tagline {
        color: #d090b8;
        font-size: 0.85rem;
        margin-top: 0.6rem;
        opacity: 0.9;
        letter-spacing: 1px;
      }

      /* 导航栏整体容器 */
      .nav-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2.5rem;
        flex-wrap: wrap;
      }

      .nav-tabs {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        padding: 0.5rem 1rem;
        background: rgba(30, 10, 35, 0.6);
        backdrop-filter: blur(12px);
        border-radius: 80px;
        border: 1px solid rgba(200, 80, 140, 0.35);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      }

      .tab-btn {
        background: rgba(50, 15, 40, 0.6);
        backdrop-filter: blur(5px);
        border: 1px solid transparent;
        padding: 0.7rem 1.8rem;
        font-size: 1.05rem;
        font-weight: 600;
        border-radius: 50px;
        color: #f0c0d8;
        cursor: pointer;
        transition: all 0.3s ease;
        letter-spacing: 0.8px;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .tab-btn i {
        font-style: normal;
        font-size: 1.2rem;
      }

      /* 导航分类图标图片 */
      .tab-icon-img {
        width: 22px;
        height: 22px;
        object-fit: contain;
        vertical-align: middle;
        filter: drop-shadow(0 2px 4px rgba(255, 100, 160, 0.4));
      }

      .tab-btn:hover {
        background: #8b3060;
        color: white;
        border-color: rgba(255, 180, 210, 0.5);
        box-shadow: 0 0 18px #cc4488;
        transform: translateY(-2px);
      }

      .tab-btn.active {
        background: #c04078;
        color: white;
        box-shadow: 0 0 22px #e85090;
        border: 1px solid rgba(255, 200, 220, 0.6);
        font-weight: 700;
      }

      /* 刷新图片按钮 */
      .global-refresh-btn {
        background: transparent;
        border: none;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 6px;
        position: relative;
      }

      .global-refresh-btn img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 4px 10px rgba(255, 80, 140, 0.5));
        transition: all 0.3s ease;
      }

      .global-refresh-btn:hover img {
        filter: drop-shadow(0 6px 18px rgba(255, 100, 180, 0.8));
        transform: scale(1.12);
      }

      .global-refresh-btn:active img {
        transform: scale(0.9);
        transition: transform 0.1s ease;
      }

      /* 旋转动画 */
      .global-refresh-btn.spinning img {
        animation: spinRefresh 0.7s ease-in-out;
      }

      @keyframes spinRefresh {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .refresh-hint {
        text-align: center;
        color: #c890b0;
        font-size: 0.78rem;
        margin-top: 0.3rem;
        margin-bottom: -0.5rem;
        opacity: 0.85;
        letter-spacing: 0.5px;
      }

      .gallery-wrap {
        min-height: 480px;
        transition: 0.25s;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.8rem;
        justify-items: center;
        align-items: start;
      }

      .image-card {
        background: rgba(30, 10, 35, 0.7);
        backdrop-filter: blur(9px);
        border-radius: 1.5rem;
        overflow: hidden;
        width: 100%;
        max-width: 280px;
        transition: all 0.35s cubic-bezier(0.15, 0.9, 0.3, 1.1);
        box-shadow: 0 18px 28px -8px rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(200, 100, 150, 0.35);
        cursor: pointer;
        background: linear-gradient(
          145deg,
          rgba(40, 15, 45, 0.75),
          rgba(20, 8, 30, 0.85)
        );
      }

      .image-card:hover {
        transform: translateY(-10px) scale(1.02);
        box-shadow:
          0 30px 40px -12px #000000cc,
          0 0 0 1.5px rgba(255, 130, 180, 0.8);
        border-color: #ff88b8;
      }

      .img-thumb {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        display: block;
        background: #1a0520;
        transition: transform 0.4s;
      }

      .image-card:hover .img-thumb {
        transform: scale(1.03);
      }

      .card-footer {
        padding: 0.7rem 0.5rem;
        text-align: center;
        font-size: 0.75rem;
        font-weight: 500;
        color: #e8b8cc;
        background: rgba(0, 0, 0, 0.5);
        letter-spacing: 0.6px;
        backdrop-filter: blur(2px);
      }

      .loading-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 1rem;
        color: #e8b8d0;
        text-align: center;
      }

      .spinner {
        width: 55px;
        height: 55px;
        border: 5px solid rgba(200, 80, 140, 0.25);
        border-top: 5px solid #e860a0;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin-bottom: 1.2rem;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .info-badge {
        background: rgba(60, 10, 40, 0.7);
        padding: 0.4rem 1.6rem;
        border-radius: 30px;
        font-size: 0.85rem;
        backdrop-filter: blur(4px);
        margin-top: 1rem;
        border: 1px solid #b85080;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 2, 15, 0.96);
        backdrop-filter: blur(12px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: #1a0825;
        border-radius: 2.4rem;
        max-width: 92vw;
        max-height: 94vh;
        padding: 1.2rem;
        text-align: center;
        box-shadow:
          0 35px 55px rgba(0, 0, 0, 0.8),
          0 0 0 2px #b84070;
        animation: fadeUp 0.3s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: scale(0.94);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .modal-img {
        max-width: 100%;
        max-height: 72vh;
        border-radius: 1.4rem;
        box-shadow: 0 10px 28px black;
        background: #100418;
      }
      .modal-buttons {
        margin-top: 1.2rem;
        display: flex;
        gap: 1.2rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .modal-btn {
        background: #8b3060;
        border: none;
        padding: 0.7rem 1.8rem;
        font-weight: 600;
        border-radius: 3rem;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.95rem;
        backdrop-filter: blur(5px);
        border: 1px solid #c86090;
      }
      .modal-btn:hover {
        background: #b84878;
        box-shadow: 0 0 18px #d86090;
      }
      .close-modal {
        background: #3a2040;
        border-color: #705070;
      }
      .save-btn {
        background: #9b3870;
      }
      .error-tip {
        color: #ffb0c8;
        margin-top: 0.6rem;
        font-size: 0.8rem;
      }
      footer {
        text-align: center;
        margin-top: 2.5rem;
        color: #c080a0;
        font-size: 0.8rem;
        opacity: 0.8;
      }

      @media (max-width: 650px) {
        .app-container {
          padding: 1.4rem 1rem;
        }
        .gallery-grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 1.2rem;
        }
        .tab-btn {
          padding: 0.5rem 1.2rem;
          font-size: 0.9rem;
        }
        .global-refresh-btn {
          width: 44px;
          height: 44px;
        }
        .nav-container {
          gap: 0.6rem;
        }
        .header h1 {
          font-size: 2rem;
        }
        .title-icon-img {
          width: 36px;
          height: 36px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="header">
        <h1>
          <span class="icon-left">
            <img
              src="icon-left.png"
              alt="左图标"
              class="title-icon-img"
              onerror="
                this.style.display = 'none';
                this.parentElement.innerHTML = '🔞';
              "
            />
          </span>
          涩痞聚集地
          <span class="icon-right">
            <img
              src="icon-right.png"
              alt="右图标"
              class="title-icon-img"
              onerror="
                this.style.display = 'none';
                this.parentElement.innerHTML = '💋';
              "
            />
          </span>
        </h1>
        <div class="subtitle">👑 绅士专属 · 精品图库 👑</div>
        <div class="tagline">✦ 优雅地欣赏美 · 低调地保存爱 ✦</div>
      </div>

      <!-- 导航栏 + 刷新按钮 -->
      <div class="nav-container">
        <div class="nav-tabs" id="navTabs"></div>
        <button
          class="global-refresh-btn"
          id="globalRefreshBtn"
          title="刷新当前分类"
        >
          <img
            src="../img/shuaxin.png"
            alt="刷新"
            onerror="
              this.style.display = 'none';
              this.parentElement.innerHTML = '🔄';
            "
          />
        </button>
      </div>

      <!-- 图片画廊 -->
      <div class="gallery-wrap" id="galleryWrap">
        <div class="loading-placeholder" id="globalLoading">
          <div class="spinner"></div>
          <div>正在召集精选美图...</div>
        </div>
      </div>
      <footer>
        🌟 每个分类随机20张 · 去重逻辑保证不重复 · 选中分类后点击刷新图标
      </footer>
    </div>

    <!-- 大图模态框 -->
    <div id="imageModal" class="modal">
      <div class="modal-content">
        <img id="modalImage" class="modal-img" alt="高清预览" />
        <div class="modal-buttons">
          <button id="saveImageBtn" class="modal-btn save-btn">
            💾 保存到本地
          </button>
          <button id="closeModalBtn" class="modal-btn close-modal">
            ✖ 关闭
          </button>
        </div>
        <div id="saveErrorMsg" class="error-tip"></div>
      </div>
    </div>

    <script>
      (function () {
        // ----- 分类配置（导航栏图标也使用图片）-----
        const CATEGORIES = [
          {
            id: "white_silk",
            name: "白丝·纯",
            iconImg: "icon-white.png", // 白丝图标图片
            iconFallback: "🤍",
            apiUrl: "https://openapi.dwo.cc/api/bs_img",
            parseImageUrl: (data) => {
              if (data && data["状态"] === "成功" && data["数据"]?.pic) {
                return data["数据"]["pic"];
              }
              return null;
            },
          },
          {
            id: "black_silk",
            name: "黑丝·魅",
            iconImg: "icon-black.png", // 黑丝图标图片
            iconFallback: "🖤",
            apiUrl: "https://openapi.dwo.cc/api/hs_img",
            parseImageUrl: (data) => {
              if (data && data["状态"] === "成功" && data["数据"]?.pic) {
                return data["数据"]["pic"];
              }
              return null;
            },
          },
          {
            id: "anime3",
            name: "动漫·雅",
            iconImg: "icon-anime.png", // 动漫图标图片
            iconFallback: "✨",
            apiUrl: "https://api.yaohud.cn/api/v2/setu?key=WL7tcvhTeD9l16JMLMU",
            parseImageUrl: (data) => {
              if (data && data.code === 200 && data.data?.url) {
                return data.data.url;
              }
              return null;
            },
          },
        ];

        // 状态管理
        const imagesCache = new Map();
        let activeCategoryId = "white_silk";
        let currentModalUrl = "";
        let isRefreshing = false;

        // DOM元素
        const navContainer = document.getElementById("navTabs");
        const galleryWrap = document.getElementById("galleryWrap");
        const globalRefreshBtn = document.getElementById("globalRefreshBtn");
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        const saveBtn = document.getElementById("saveImageBtn");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const saveErrorMsgSpan = document.getElementById("saveErrorMsg");

        function escapeHtml(str) {
          if (!str) return "";
          return str.replace(
            /[&<>]/g,
            (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
          );
        }

        async function fetchSingleImage(categoryConfig) {
          const { apiUrl, parseImageUrl } = categoryConfig;
          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            const resp = await fetch(apiUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!resp.ok) return null;
            const data = await resp.json();
            const img = parseImageUrl(data);
            if (
              img &&
              (img.startsWith("http://") || img.startsWith("https://"))
            ) {
              return img.replace(/\\\//g, "/");
            }
            return null;
          } catch (e) {
            console.warn(`获取失败 (${categoryConfig.name}):`, e);
            return null;
          }
        }

        async function fetchMultipleImagesWithDedup(
          categoryConfig,
          targetCount = 20,
          existingUrls = [],
        ) {
          const existingSet = new Set(existingUrls);
          const newUnique = [];
          let attempts = 0;
          const maxAttempts = targetCount * 4;

          while (newUnique.length < targetCount && attempts < maxAttempts) {
            let url = null;
            for (let retry = 0; retry <= 1; retry++) {
              url = await fetchSingleImage(categoryConfig);
              if (url) break;
              if (retry === 0) await new Promise((r) => setTimeout(r, 130));
            }
            if (url) {
              if (!existingSet.has(url) && !newUnique.includes(url)) {
                newUnique.push(url);
                existingSet.add(url);
              }
            }
            attempts++;
            await new Promise((r) => setTimeout(r, 70));
          }

          if (newUnique.length === 0 && existingUrls.length > 0) {
            return existingUrls;
          }
          if (newUnique.length < targetCount) {
            let fillAttempts = 0;
            while (
              newUnique.length < targetCount &&
              fillAttempts < targetCount * 2
            ) {
              const extra = await fetchSingleImage(categoryConfig);
              if (
                extra &&
                !existingSet.has(extra) &&
                !newUnique.includes(extra)
              ) {
                newUnique.push(extra);
                existingSet.add(extra);
              }
              fillAttempts++;
              await new Promise((r) => setTimeout(r, 60));
            }
          }
          return newUnique.slice(0, targetCount);
        }

        function renderGallery(categoryId, imageUrls) {
          if (!imageUrls || imageUrls.length === 0) {
            galleryWrap.innerHTML = `<div class="loading-placeholder">🌙 暂无图片，切换分类或点击刷新图标</div>`;
            return;
          }
          let html = `<div class="gallery-grid">`;
          imageUrls.forEach((url) => {
            html += `
          <div class="image-card" data-imgurl="${escapeHtml(url)}">
            <img class="img-thumb" src="${escapeHtml(url)}" alt="美图" loading="lazy"
                 onerror="this.onerror=null; this.src='https://placehold.co/400x500/1a0520/e8b8cc?text=💔+加载失败';">
            <div class="card-footer">🖱️ 点击查看大图</div>
          </div>`;
          });
          html += `</div>`;
          galleryWrap.innerHTML = html;

          document.querySelectorAll(".image-card").forEach((card) => {
            card.addEventListener("click", (e) => {
              const imgUrl = card.getAttribute("data-imgurl");
              if (imgUrl) openModal(imgUrl);
            });
          });
        }

        function showLoading(msg) {
          galleryWrap.innerHTML = `<div class="loading-placeholder"><div class="spinner"></div><div>${msg}</div><div class="info-badge">💜 涩痞加载中...</div></div>`;
        }

        // 刷新按钮旋转动画
        function animateRefreshBtn() {
          globalRefreshBtn.classList.add("spinning");
          setTimeout(() => {
            globalRefreshBtn.classList.remove("spinning");
          }, 700);
        }

        async function loadCategoryImages(categoryId, forceRefresh = false) {
          const category = CATEGORIES.find((c) => c.id === categoryId);
          if (!category) return;
          const cache = imagesCache.get(categoryId) || {
            urls: [],
            loaded: false,
            loading: false,
          };

          if (!forceRefresh && cache.loaded && cache.urls.length > 0) {
            renderGallery(categoryId, cache.urls);
            return;
          }
          if (!forceRefresh && cache.loading) {
            showLoading("稍等，涩痞正在获取中...");
            return;
          }

          imagesCache.set(categoryId, {
            ...cache,
            loading: true,
            loaded: false,
          });
          const categoryName = category.name;
          showLoading(
            forceRefresh
              ? `🔄 刷新 ${categoryName} 全新图集...`
              : `✨ 载入 ${categoryName} 图集`,
          );

          const baseUrls = forceRefresh ? [] : cache.urls || [];
          const newUrls = await fetchMultipleImagesWithDedup(
            category,
            20,
            baseUrls,
          );

          if (newUrls.length === 0 && cache.urls?.length) {
            imagesCache.set(categoryId, {
              urls: cache.urls,
              loaded: true,
              loading: false,
            });
            renderGallery(categoryId, cache.urls);
            return;
          }
          imagesCache.set(categoryId, {
            urls: newUrls,
            loaded: true,
            loading: false,
          });
          renderGallery(categoryId, newUrls);
        }

        function openModal(url) {
          if (!url) return;
          currentModalUrl = url;
          modalImg.src = url;
          modal.classList.add("active");
          saveErrorMsgSpan.innerText = "";
        }

        function closeModal() {
          modal.classList.remove("active");
          modalImg.src = "";
          currentModalUrl = "";
          saveErrorMsgSpan.innerText = "";
        }

        async function saveImage(url) {
          if (!url) return;
          saveErrorMsgSpan.innerText = "⏳ 下载中...";
          try {
            const resp = await fetch(url, { mode: "cors" });
            if (!resp.ok) throw new Error("status " + resp.status);
            const blob = await resp.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            const ext =
              (url.split("?")[0].match(/\.(jpg|jpeg|png|webp|gif)/i) ||
                [])[1] || "jpg";
            a.href = blobUrl;
            a.download = `sepi_${Date.now()}.${ext}`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(blobUrl);
            saveErrorMsgSpan.innerText = "✅ 保存成功";
            setTimeout(() => {
              if (saveErrorMsgSpan.innerText === "✅ 保存成功")
                saveErrorMsgSpan.innerText = "";
            }, 2000);
          } catch (e) {
            saveErrorMsgSpan.innerHTML = `⚠️ 自动保存失败，可<a href="${escapeHtml(url)}" target="_blank">打开原图</a>手动保存`;
          }
        }

        function buildNavbar() {
          navContainer.innerHTML = "";
          CATEGORIES.forEach((cat) => {
            const btn = document.createElement("button");
            btn.className =
              "tab-btn" + (cat.id === activeCategoryId ? " active" : "");
            btn.setAttribute("data-id", cat.id);

            // 使用图片图标，加载失败时使用文字回退
            const iconHtml = `<img src="${cat.iconImg}" alt="${cat.name}" class="tab-icon-img" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','${cat.iconFallback}');">`;
            btn.innerHTML = `${iconHtml} ${cat.name}`;

            btn.addEventListener("click", (e) => {
              e.stopPropagation();

              if (cat.id === activeCategoryId) return;

              activeCategoryId = cat.id;
              buildNavbar();

              const cache = imagesCache.get(cat.id);
              if (cache?.loaded && cache.urls.length > 0) {
                renderGallery(cat.id, cache.urls);
              } else {
                loadCategoryImages(cat.id, false);
              }
            });

            navContainer.appendChild(btn);
          });
        }

        // 全局刷新按钮事件
        globalRefreshBtn.addEventListener("click", async () => {
          if (isRefreshing) return;
          if (!activeCategoryId) return;

          isRefreshing = true;
          animateRefreshBtn();

          try {
            await loadCategoryImages(activeCategoryId, true);
          } finally {
            setTimeout(() => {
              isRefreshing = false;
            }, 600);
          }
        });

        // 事件绑定
        saveBtn.addEventListener("click", () => saveImage(currentModalUrl));
        closeModalBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) closeModal();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && modal.classList.contains("active"))
            closeModal();
        });

        // 启动
        async function init() {
          buildNavbar();
          activeCategoryId = "white_silk";
          await loadCategoryImages("white_silk", false);
        }

        init();
      })();
    </script>
  </body>
</html>
